source = ~/.config/hypr/varibales.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/exec.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/env.conf


# Mirror Monitors
# source =~/.config/hypr/mirror_monitor.conf


#Dual Monitors each Monitor with 5 workspaces
# source =~/.config/hypr/dual_monitor.conf

source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/monitors.conf


# Some default env vars
# unscale XWayland
xwayland {
  force_zero_scaling = true
}

input {
  # qwerty
  kb_layout = us
  kb_variant =
  kb_model =

	# Reamp Caps-Lock to Ctrl
  kb_options = ctrl:nocaps
  kb_rules =

  follow_mouse = 1
  numlock_by_default = 1

  touchpad {
    natural_scroll = true
    tap-to-click = true
    drag_lock = true
    disable_while_typing = true
  }
  sensitivity = 0.7 # -1.0 - 1.0, 0 means no modification
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  no_direct_scanout = true #for fullscreen games
}

binds {
  workspace_back_and_forth = true
}

general {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more

  gaps_in = 2
  gaps_out = 4
  border_size = 1

  #one color
  col.active_border = rgba(89b4faff)

  #two colors - gradient

 # col.active_border = rgba(7aa2f7aa) rgba(c4a7e7aa) 45deg
  col.inactive_border = rgba(1e1e2eff)

  #layout = master
  layout = dwindle
	cursor_inactive_timeout =1
	no_border_on_floating=true
	resize_on_border=true
	extend_border_grab_area=15
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 2

    blur {
        enabled = true
        size = 2
        passes = 2
    }

    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

blurls = waybar

animations {
  enabled = true

  # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

  bezier = myBezier, 0.05, 0.9, 0.1, 1.05

  animation = windows, 1, 4, myBezier
  animation = windowsOut, 1, 4, default, popin 80%
  animation = border, 1, 5, default
  animation = fade, 1, 4, default
  animation = workspaces, 1, 3, default
}


dwindle {
  # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
  pseudotile = true
  preserve_split = true
	no_gaps_when_only= 0
}

master {
  # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
  new_is_master = true
  mfact = 0.5
	no_gaps_when_only=0
}

gestures {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more
  workspace_swipe = false
  workspace_swipe_fingers = 3
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
