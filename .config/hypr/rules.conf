# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# Example windowrule v1
# windowrule = float, yad|nm-connection-editor|pavucontrol
# windowrule = float, feh|Gimp|qt5ct
windowrulev2 = noborder, onworkspace:1

#settings
windowrulev2 = workspace 10, title:^(nwg-look)$
windowrulev2 = workspace 10, title:^(Qt5 Configuration Tool)$
windowrulev2 = workspace 10, title:^(Qt6 Configuration Tool)$
windowrulev2 = workspace 10, title:^(ArcoLinux Welcome App)$
windowrulev2 = workspace 10, title:^(Volume Control)$
windowrulev2 = workspace 10, title:^(ROG Control Center)$

#Spotify
windowrulev2 = workspace 9, title:^(Spotify Free)$
windowrulev2 = workspace 9 ,class:^(mpv)$

#Discord / webcord
windowrulev2 = workspace 8, class:^(discord)$
windowrulev2 = workspace 8, class:^(webcord)$
windowrulev2 = workspace 8, class:^(com.rtosta.zapzap)$

#terminal
windowrulev2 = workspace 1, class:^(Alacritty)$
windowrulev2 = workspace 1, class:^(kitty)$
windowrulev2 = workspace 1, class:^(org.wezfurlong.wezterm)$
windowrulev2 = opacity 0.95 0.95 ,class:^(kitty)$
windowrulev2 = opacity 0.95 0.95 ,class:^(org.wezfurlong.wezterm)$
windowrulev2 = opacity 0.95 0.95 ,class:^(Alacritty)$

#browser
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 2, class:^(Brave)$

#file manager
windowrulev2 = workspace 3, class:^(Thunar)$
windowrulev2 = workspace 3, class:^(nemo)$
windowrulev2 = workspace 3, class:^(dolphin)$
# torrent client
windowrulev2 = workspace 3, class:^(org.qbittorrent.qBittorrent)$

#andriod studio
windowrulev2 = workspace 7, class:^(jetbrains-studio)$

#db gate
windowrulev2 = workspace 6, class:^(dbgate)$

#insomnia
windowrulev2 = workspace 5, class:^(Insomnia)$


# for waybar yay update click
windowrulev2 = animation popin, class:^(update)$, title:^(update)$
windowrulev2 = float, class:^(update)$, title:^(update)$
windowrulev2 = size 60% 50%, class:^(update)$, title:^(update)$
windowrulev2 = center, class:^(update)$, title:^(update)$

# for ttyclock
windowrulev2 = float, class:^(clock)$, title:^(clock)$
windowrulev2 = size 33% 27%, class:^(clock)$, title:^(clock)$
windowrulev2 = center, class:^(clock)$, title:^(clock)$


windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$
